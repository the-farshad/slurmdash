name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  linux-x86_64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-

      - name: Build release binary
        run: cargo build --release --locked

      - name: Package tarball
        id: pkg
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          STAGE="slurmdash-${VERSION}-x86_64-unknown-linux-gnu"
          mkdir -p "$STAGE"
          cp target/release/slurmdash README.md CHANGELOG.md LICENSE "$STAGE/"
          tar -czf "${STAGE}.tar.gz" "$STAGE"
          sha256sum "${STAGE}.tar.gz" > "${STAGE}.tar.gz.sha256"
          echo "tarball=${STAGE}.tar.gz" >> "$GITHUB_OUTPUT"
          echo "sha256=${STAGE}.tar.gz.sha256" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="$GITHUB_REF_NAME"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" \
              "${{ steps.pkg.outputs.tarball }}" \
              "${{ steps.pkg.outputs.sha256 }}" \
              --clobber
          else
            gh release create "$TAG" \
              --title "slurmdash $TAG" \
              --notes-file CHANGELOG.md \
              "${{ steps.pkg.outputs.tarball }}" \
              "${{ steps.pkg.outputs.sha256 }}"
          fi
