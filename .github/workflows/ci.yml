name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --no-deps -- -D warnings

      - name: Unit + integration tests
        run: cargo test --workspace --no-fail-fast

      - name: CLI smoke test
        run: |
          set -euo pipefail
          cargo build --release --locked
          BIN=./target/release/slurmdash
          $BIN --version
          $BIN --help > /dev/null
          for sub in db assist recommend config completions web logs cancel hold release requeue submit; do
            $BIN "$sub" --help > /dev/null
          done
          # Subcommands of `db` and `config`:
          for sub in status migrate vacuum backup clear-cache clear-history export; do
            $BIN db "$sub" --help > /dev/null
          done
          for sub in init show path; do
            $BIN config "$sub" --help > /dev/null
          done
          # Generated completion scripts must be non-empty for each shell:
          for shell in bash zsh fish powershell elvish; do
            test -s <($BIN completions "$shell")
          done
